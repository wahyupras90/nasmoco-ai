<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nasmoco AI</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #22263a;
    --border: #2e3350;
    --accent: #e8003d;
    --accent2: #ff6b35;
    --text: #e8eaf0;
    --text2: #8890aa;
    --user-bubble: #1e3a5f;
    --ai-bubble: #1a1d27;
    --mono: 'Courier New', monospace;
    --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }

  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── Header ── */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 12px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
  }

  .logo {
    width: 32px; height: 32px;
    background: var(--accent);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-weight: 900; font-size: 14px; color: white;
    flex-shrink: 0;
  }

  header h1 {
    font-size: 15px; font-weight: 700;
    letter-spacing: 0.5px;
  }

  header span {
    font-size: 11px; color: var(--text2);
    display: block; margin-top: 1px;
  }

  .status-dot {
    width: 7px; height: 7px;
    background: #22c55e;
    border-radius: 50%;
    margin-left: auto;
    flex-shrink: 0;
    box-shadow: 0 0 6px #22c55e88;
  }

  /* ── Chat area ── */
  #chat {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    scroll-behavior: smooth;
  }

  /* scrollbar */
  #chat::-webkit-scrollbar { width: 4px; }
  #chat::-webkit-scrollbar-track { background: transparent; }
  #chat::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .msg {
    display: flex;
    flex-direction: column;
    max-width: 88%;
    animation: fadeIn 0.18s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .msg.user { align-self: flex-end; align-items: flex-end; }
  .msg.ai   { align-self: flex-start; align-items: flex-start; }

  .bubble {
    padding: 10px 14px;
    border-radius: 14px;
    font-size: 14px;
    line-height: 1.55;
    word-break: break-word;
    white-space: pre-wrap;
  }

  .msg.user .bubble {
    background: var(--user-bubble);
    border-bottom-right-radius: 4px;
    color: #d8e8ff;
  }

  .msg.ai .bubble {
    background: var(--ai-bubble);
    border: 1px solid var(--border);
    border-bottom-left-radius: 4px;
    font-family: var(--mono);
    font-size: 13px;
  }

  /* Highlight angka di response AI */
  .msg.ai .bubble .num { color: #7dd3fc; font-weight: 600; }

  .msg-time {
    font-size: 10px;
    color: var(--text2);
    margin-top: 4px;
    padding: 0 4px;
  }

  /* Typing indicator */
  .typing { display: flex; gap: 4px; padding: 12px 14px; }
  .typing span {
    width: 7px; height: 7px;
    background: var(--text2);
    border-radius: 50%;
    animation: bounce 1.2s infinite;
  }
  .typing span:nth-child(2) { animation-delay: .2s; }
  .typing span:nth-child(3) { animation-delay: .4s; }
  @keyframes bounce {
    0%,60%,100% { transform: translateY(0); }
    30%          { transform: translateY(-6px); }
  }

  /* ── Quick commands ── */
  #quick-cmds {
    display: flex;
    gap: 6px;
    padding: 8px 16px 0;
    overflow-x: auto;
    flex-shrink: 0;
  }
  #quick-cmds::-webkit-scrollbar { display: none; }

  .qcmd {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 5px 12px;
    font-size: 12px;
    color: var(--text2);
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.15s;
    flex-shrink: 0;
  }
  .qcmd:hover, .qcmd:active {
    background: var(--border);
    color: var(--text);
  }

  /* ── Input area ── */
  #input-area {
    padding: 10px 12px 14px;
    background: var(--surface);
    border-top: 1px solid var(--border);
    display: flex;
    gap: 8px;
    align-items: flex-end;
    flex-shrink: 0;
  }

  #input {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 10px 14px;
    font-size: 14px;
    color: var(--text);
    font-family: var(--font);
    resize: none;
    outline: none;
    max-height: 120px;
    line-height: 1.4;
    transition: border-color 0.15s;
  }
  #input:focus { border-color: var(--accent); }
  #input::placeholder { color: var(--text2); }

  #send-btn {
    background: var(--accent);
    border: none;
    border-radius: 10px;
    width: 40px; height: 40px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: background 0.15s, transform 0.1s;
  }
  #send-btn:hover   { background: #c4002f; }
  #send-btn:active  { transform: scale(0.95); }
  #send-btn svg { width: 18px; height: 18px; fill: white; }

  /* ── Intro / empty state ── */
  #empty-state {
    margin: auto;
    text-align: center;
    color: var(--text2);
    padding: 24px;
  }
  #empty-state .big { font-size: 36px; margin-bottom: 8px; }
  #empty-state p { font-size: 13px; line-height: 1.6; }

  /* ── Tabel di bubble AI ── */
  .tbl-wrap {
    overflow-x: auto;
    margin-top: 4px;
    border-radius: 6px;
  }
  .tbl-wrap::-webkit-scrollbar { height: 4px; }
  .tbl-wrap::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .ai-table {
    border-collapse: collapse;
    font-size: 12px;
    font-family: var(--mono);
    white-space: nowrap;
    min-width: 100%;
  }
  .ai-table th {
    background: #2a2e42;
    color: #a0a8c0;
    padding: 5px 10px;
    text-align: left;
    border-bottom: 1px solid var(--border);
    font-weight: 600;
    letter-spacing: 0.3px;
  }
  .ai-table td {
    padding: 4px 10px;
    border-bottom: 1px solid #1e2236;
    color: var(--text);
  }
  .ai-table tr:last-child td { border-bottom: none; }
  .ai-table tr:nth-child(even) td { background: #1e2133; }
  .ai-table td.num-cell { text-align: right; color: #7dd3fc; }

  /* ── Download button ── */
  .dl-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    margin-top: 8px;
    padding: 7px 14px;
    background: #16a34a;
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 13px;
    font-family: var(--font);
    cursor: pointer;
    text-decoration: none;
    transition: background 0.15s;
  }
  .dl-btn:hover { background: #15803d; }
  .dl-btn svg { width: 14px; height: 14px; fill: white; }

  /* ── Debug badge ── */
  #debug-toggle {
    font-size: 11px;
    color: var(--text2);
    cursor: pointer;
    padding: 2px 8px;
    border: 1px solid var(--border);
    border-radius: 10px;
    user-select: none;
  }
  #debug-toggle.on { color: var(--accent2); border-color: var(--accent2); }
</style>
</head>
<body>

<header>
  <div class="logo">N</div>
  <div>
    <h1>Nasmoco AI</h1>
    <span>Analyst · Tegal</span>
  </div>
  <span id="debug-toggle" onclick="toggleDebug()">debug off</span>
  <div class="status-dot" title="Online"></div>
</header>

<div id="quick-cmds">
  <div class="qcmd" onclick="useCmd(this)">Revenue bulan ini</div>
  <div class="qcmd" onclick="useCmd(this)">CPUS bulan ini per SA</div>
  <div class="qcmd" onclick="useCmd(this)">Ranking SA bulan ini</div>
  <div class="qcmd" onclick="useCmd(this)">Attack list TCARE expired bulan ini</div>
  <div class="qcmd" onclick="useCmd(this)">WIP sekarang</div>
  <div class="qcmd" onclick="useCmd(this)">Buat laporan</div>
</div>

<div id="chat">
  <div id="empty-state">
    <div class="big">🔍</div>
    <p>Tanya apa saja tentang data bengkel.<br>
    Ketik atau pilih shortcut di atas.</p>
  </div>
</div>

<div id="input-area">
  <textarea id="input" rows="1" placeholder="Tanya sesuatu..." 
    onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
  <button id="send-btn" onclick="sendMsg()">
    <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
  </button>
</div>

<script>
  // Session ID unik per tab
  const SESSION_ID = 'sess_' + Math.random().toString(36).slice(2, 10);
  let debugMode = false;
  let isLoading = false;

  function toggleDebug() {
    debugMode = !debugMode;
    const el = document.getElementById('debug-toggle');
    el.textContent = debugMode ? 'debug on' : 'debug off';
    el.classList.toggle('on', debugMode);
  }

  function useCmd(el) {
    const inp = document.getElementById('input');
    inp.value = el.textContent;
    autoResize(inp);
    inp.focus();
  }

  function autoResize(ta) {
    ta.style.height = 'auto';
    ta.style.height = Math.min(ta.scrollHeight, 120) + 'px';
  }

  function handleKey(e) {
    // Enter kirim, Shift+Enter newline
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMsg();
    }
  }

  function now() {
    return new Date().toLocaleTimeString('id-ID', {hour:'2-digit', minute:'2-digit'});
  }

  function addMsg(role, text) {
    const chat = document.getElementById('chat');
    const empty = document.getElementById('empty-state');
    if (empty) empty.remove();

    const div = document.createElement('div');
    div.className = `msg ${role}`;

    const bubble = document.createElement('div');
    bubble.className = 'bubble';

    if (role === 'ai') {
      const safe = text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
      bubble.innerHTML = `<div style="white-space:pre-wrap">${safe}</div>`;
    } else {
      bubble.textContent = text;
    }

    const time = document.createElement('div');
    time.className = 'msg-time';
    time.textContent = now();

    div.appendChild(bubble);
    div.appendChild(time);
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
    return div;
  }

  function addTyping() {
    const chat = document.getElementById('chat');
    const div = document.createElement('div');
    div.className = 'msg ai';
    div.id = 'typing-indicator';
    div.innerHTML = '<div class="bubble typing"><span></span><span></span><span></span></div>';
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
  }

  function removeTyping() {
    const t = document.getElementById('typing-indicator');
    if (t) t.remove();
  }

  async function sendMsg() {
    if (isLoading) return;
    const inp = document.getElementById('input');
    const text = inp.value.trim();
    if (!text) return;

    inp.value = '';
    inp.style.height = 'auto';
    addMsg('user', text);
    addTyping();
    isLoading = true;

    // Deteksi kata kunci SAWA secara kasar di client untuk mulai polling progress
    // (deteksi pasti ada di server; ini hanya untuk UX feedback selama menunggu)
    const sawaKeywords = ['sawa', 'extended warranty', 'warranty sawa',
      'ambil warranty', 'download warranty', 'cek warranty', 'ambil sawa',
      'download sawa', 'ambil extended', 'sertifikat warranty', 'sertifikat sawa'];
    const looksLikeSawa = sawaKeywords.some(k => text.toLowerCase().includes(k));
    let pollTimer = null;
    let progressDiv = null;

    if (looksLikeSawa) {
      progressDiv = addProgressMsg();
      pollTimer = setInterval(async () => {
        try {
          const r = await fetch(`/sawa-progress?session_id=${encodeURIComponent(SESSION_ID)}`);
          const p = await r.json();
          if (p.total > 0) {
            updateProgressMsg(progressDiv, p);
          }
          if (p.done && p.total > 0) {
            clearInterval(pollTimer);
          }
        } catch (e) { /* abaikan error polling, tidak kritikal */ }
      }, 1500);
    }

    try {
      const res = await fetch('/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          message: text,
          session_id: SESSION_ID,
          debug: debugMode
        })
      });
      let data;
      try {
        data = await res.json();
      } catch (parseErr) {
        removeTyping();
        addMsg('ai', '\u26a0 Server error - response bukan JSON. Cek terminal server.');
        return;
      }
      removeTyping();
      if (pollTimer) clearInterval(pollTimer);
      if (progressDiv) progressDiv.remove();

      if (data.export) {
        addExportMsg(data.filename, data.rows, SESSION_ID);
      } else if (data.sawa_zip) {
        addSawaMsg(data.vins, data.count);
      } else if (data.laporan) {
        addLaporanMsg(data.filepath);
      } else if (data.table_data) {
        addTableMsg(data.response, data.table_data);
      } else {
        addMsg('ai', data.response || '(Tidak ada output)');
      }

    } catch (err) {
      if (pollTimer) clearInterval(pollTimer);
      if (progressDiv) progressDiv.remove();
      removeTyping();
      const msg = err && err.message ? err.message : String(err);
      addMsg('ai', '\u26a0 Error: ' + msg);
    } finally {
      isLoading = false;
    }
  }

  function addProgressMsg() {
    const chat = document.getElementById('chat');
    const empty = document.getElementById('empty-state');
    if (empty) empty.remove();

    const div = document.createElement('div');
    div.className = 'msg ai';
    div.innerHTML = '<div class="bubble" id="progress-bubble">Memulai proses SAWA...</div>';
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
    return div;
  }

  function updateProgressMsg(div, p) {
    const bubble = div.querySelector('#progress-bubble');
    if (!bubble) return;
    const pct = p.total > 0 ? Math.round((p.current / p.total) * 100) : 0;
    const statusLabel = p.status === 'processing' ? 'Memproses' : p.status;
    bubble.innerHTML =
      `Download SAWA ${p.current}/${p.total} (${pct}%)<br>` +
      `<span style="color:var(--text2);font-size:12px">${statusLabel}: ${p.vin || ''}</span>`;
    div.parentElement.scrollTop = div.parentElement.scrollHeight;
  }

  function addTableMsg(text, tableData) {
    const chat = document.getElementById('chat');
    const empty = document.getElementById('empty-state');
    if (empty) empty.remove();

    const div = document.createElement('div');
    div.className = 'msg ai';

    const bubble = document.createElement('div');
    bubble.className = 'bubble';

    // Teks singkat di atas tabel (baris pertama response, kalau ada)
    let html = '';
    const firstLine = (text || "").split(String.fromCharCode(10))[0].trim();
    if (firstLine && !firstLine.includes('  ')) {
      const safe = firstLine.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
      html += `<div style="margin-bottom:8px;color:var(--text2);font-size:12px">${safe}</div>`;
    }

    // Build HTML table dari JSON
    html += '<div class="tbl-wrap"><table class="ai-table"><thead><tr>';
    tableData.columns.forEach(col => {
      html += `<th>${col}</th>`;
    });
    html += '</tr></thead><tbody>';

    tableData.rows.forEach(row => {
      html += '<tr>';
      row.forEach(cell => {
        const val = String(cell);
        const trimmed = val.trim().replace(/,/g, '');
        const isNum = val !== '' && !isNaN(parseFloat(trimmed)) && isFinite(trimmed);
        const cls = isNum ? ' class="num-cell"' : '';
        html += `<td${cls}>${val}</td>`;
      });
      html += '</tr>';
    });

    html += '</tbody></table></div>';
    if (tableData.rows.length >= 500) {
      html += '<div style="font-size:11px;color:var(--text2);margin-top:4px">Menampilkan 500 baris pertama. Export Excel untuk data lengkap.</div>';
    }

    bubble.innerHTML = html;

    const time = document.createElement('div');
    time.className = 'msg-time';
    time.textContent = now();

    div.appendChild(bubble);
    div.appendChild(time);
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
  }

  function addLaporanMsg(filepath) {
    const chat = document.getElementById('chat');
    const empty = document.getElementById('empty-state');
    if (empty) empty.remove();

    const url = `/download-laporan?filepath=${encodeURIComponent(filepath)}`;
    const filename = filepath.split(/[\\/]/).pop();

    const div = document.createElement('div');
    div.className = 'msg ai';
    div.innerHTML = `
      <div class="bubble">
        &#x2705; Laporan selesai dibuat.<br>
        <a class="dl-btn" href="${url}" download="${filename}">
          <svg viewBox="0 0 24 24"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg>
          Download Laporan
        </a>
      </div>
      <div class="msg-time">${now()}</div>
    `;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
  }

  function addSawaMsg(vins, count) {
    const chat = document.getElementById('chat');
    const empty = document.getElementById('empty-state');
    if (empty) empty.remove();

    const url = `/download-sawa-zip?vins=${encodeURIComponent(vins)}`;

    const div = document.createElement('div');
    div.className = 'msg ai';
    div.innerHTML = `
      <div class="bubble">
        &#x2705; Sertifikat SAWA selesai didownload &mdash; <strong>${count}</strong> unit.<br>
        <a class="dl-btn" href="${url}" download>
          <svg viewBox="0 0 24 24"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg>
          Download ZIP
        </a>
      </div>
      <div class="msg-time">${now()}</div>
    `;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
  }

  function addExportMsg(filename, rows, sessionId) {
    const chat = document.getElementById('chat');
    const empty = document.getElementById('empty-state');
    if (empty) empty.remove();

    const url = `/download-excel?session_id=${encodeURIComponent(sessionId)}&filename=${encodeURIComponent(filename)}`;

    const div = document.createElement('div');
    div.className = 'msg ai';
    div.innerHTML = `
      <div class="bubble">
        &#x2705; Siap di-download &mdash; <strong>${rows.toLocaleString('id-ID')}</strong> baris data.<br>
        <a class="dl-btn" href="${url}" download="${filename}">
          <svg viewBox="0 0 24 24"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg>
          Download Excel
        </a>
      </div>
      <div class="msg-time">${now()}</div>
    `;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
  }
</script>
</body>
</html>
